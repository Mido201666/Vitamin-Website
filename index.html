// ══════════════════════════════════════════════════
// APP STATE & LOGIC
// ══════════════════════════════════════════════════
let currentLang='ar', selectedSymptoms=[], useAI=false, activeTab='conditions';
const $=id=>document.getElementById(id);

function setLang(lang){
  currentLang=lang; selectedSymptoms=[]; useAI=false; activeTab='conditions';
  const info=LANGS[lang], ui=UI[lang];
  document.documentElement.lang=lang; document.documentElement.dir=info.dir;
  document.body.className=info.dir; document.body.style.fontFamily=info.font;
  renderLangBar();
  $('titleText').textContent=ui.title; $('subtitleText').textContent=ui.subtitle;
  $('disclaimerTitle').textContent=ui.disclaimerTitle; $('disclaimerText').textContent=ui.disclaimerText;
  $('searchInput').placeholder=ui.searchPlaceholder; $('searchInput').value='';
  $('customSymptom').placeholder=ui.customPlaceholder; $('customSymptom').value='';
  $('aiLabel').textContent=ui.aiOff; $('aiLabel').style.color='#6b8299';
  $('aiSwitch').className='switch'; $('btnContent').textContent=ui.analyzeBtn;
  $('analyzeBtn').disabled=true; $('countBadge').classList.add('hidden');
  $('resultsSection').classList.add('hidden'); $('resultsSection').innerHTML='';
  renderChips();
}

function renderLangBar(){
  const bar=$('langBar'); bar.innerHTML='';
  Object.entries(LANGS).forEach(([c,info])=>{
    const b=document.createElement('button');
    b.className=`lang-btn ${c===currentLang?'active':''}`;
    b.innerHTML=`<span class="lang-flag">${info.flag}</span>${info.label}`;
    b.addEventListener('click',()=>setLang(c)); bar.appendChild(b);
  });
}

function renderChips(filter=''){
  const g=$('chipsGrid'); g.innerHTML='';
  Object.entries(SYMPTOMS[currentLang]).forEach(([name,data])=>{
    if(filter&&!name.toLowerCase().includes(filter.toLowerCase()))return;
    const sel=selectedSymptoms.includes(name);
    const d=document.createElement('div'); d.className=`chip ${sel?'selected':''}`;
    d.innerHTML=`<span class="chip-icon">${data.icon}</span><span>${name}</span>${sel?'<span class="chip-check">✓</span>':''}`;
    d.addEventListener('click',()=>{const i=selectedSymptoms.indexOf(name);if(i>-1)selectedSymptoms.splice(i,1);else selectedSymptoms.push(name);updateUI()});
    g.appendChild(d);
  });
}

function updateUI(){
  const ui=UI[currentLang]; renderChips($('searchInput').value);
  if(selectedSymptoms.length>0){$('countBadge').classList.remove('hidden');$('countBadge').textContent=selectedSymptoms.length+ui.countSuffix;}
  else $('countBadge').classList.add('hidden');
  $('analyzeBtn').disabled=selectedSymptoms.length===0&&!$('customSymptom').value.trim();
  $('resultsSection').classList.add('hidden'); $('resultsSection').innerHTML='';
}

$('searchInput').addEventListener('input',e=>renderChips(e.target.value));
$('customSymptom').addEventListener('input',()=>{$('analyzeBtn').disabled=selectedSymptoms.length===0&&!$('customSymptom').value.trim()});

$('aiToggle').addEventListener('click',()=>{
  useAI=!useAI; const ui=UI[currentLang];
  $('aiSwitch').className=`switch ${useAI?'on':''}`;
  $('aiLabel').textContent=useAI?ui.aiOn:ui.aiOff;
  $('aiLabel').style.color=useAI?'#00d2b4':'#6b8299';
});

$('analyzeBtn').addEventListener('click',()=>{
  if(selectedSymptoms.length===0&&!$('customSymptom').value.trim())return;
  if(useAI)analyzeWithAI();else showLocalResults();
});

function showLocalResults(){
  const data=ANALYSIS[currentLang]; const allC=[],allV=[],allT=[];
  selectedSymptoms.forEach(s=>{const d=data[s];if(!d)return;d.conditions.forEach(c=>{if(!allC.includes(c))allC.push(c)});d.vitamins.forEach(v=>{if(!allV.find(x=>x.name===v.name))allV.push(v)});d.tips.forEach(t=>{if(!allT.includes(t))allT.push(t)})});
  activeTab='conditions'; renderResults({conditions:allC,vitamins:allV,tips:allT},false);
}

async function analyzeWithAI(){
  const ui=UI[currentLang];
  $('btnContent').innerHTML=`<div class="spinner"></div> ${ui.analyzing}`; $('analyzeBtn').disabled=true;
  const all=[...selectedSymptoms]; if($('customSymptom').value.trim())all.push($('customSymptom').value.trim());
  const langName={ar:'Arabic',en:'English',fr:'French',tr:'Turkish'}[currentLang];
  const prompt=`You are a medical consultant. Patient symptoms: ${all.join(", ")}\n\nRespond ONLY in ${langName}. JSON only:\n{"combined_analysis":"brief analysis","possible_conditions":["3-5 conditions"],"vitamin_deficiencies":[{"name":"","dose":"","reason":"","priority":"high/medium/low"}],"recommended_tests":["tests"],"urgent_warning":"warning or null","lifestyle_tips":["3-5 tips"]}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const d=await r.json(); const t=d.content.map(i=>i.text||"").join("\n");
    const p=JSON.parse(t.replace(/```json|```/g,"").trim());
    activeTab='conditions'; renderResults(p,true);
  }catch(e){console.error(e);useAI=false;$('aiSwitch').className='switch';$('aiLabel').textContent=ui.aiOff;$('aiLabel').style.color='#6b8299';showLocalResults()}
  $('btnContent').textContent=ui.analyzeBtn; $('analyzeBtn').disabled=false;
}

function renderResults(data,isAI){
  const sec=$('resultsSection'), ui=UI[currentLang];
  sec.classList.remove('hidden'); sec.className='results-section';
  let h=`<h2 class="results-title">${ui.resultsTitle}</h2>`;
  if(isAI&&data.combined_analysis)h+=`<div class="analysis-card"><h3>${ui.combinedTitle}</h3><p>${data.combined_analysis}</p></div>`;
  if(isAI&&data.urgent_warning&&data.urgent_warning!=='null'&&data.urgent_warning!==null)h+=`<div class="urgent-banner"><span style="font-size:22px;flex-shrink:0">🚨</span><p>${data.urgent_warning}</p></div>`;
  const tabs=isAI?[['conditions',ui.tabConditions],['vitamins',ui.tabVitamins],['tests',ui.tabTests],['tips',ui.tabTips]]:[['conditions',ui.tabConditions],['vitamins',ui.tabVitamins],['tips',ui.tabTips]];
  h+=`<div class="tabs" id="tabsBar">`; tabs.forEach(([k,l])=>{h+=`<button class="tab-btn ${activeTab===k?'active':''}" data-tab="${k}">${l}</button>`}); h+=`</div><div id="tabContent"></div>`;
  h+=`<div class="footer-disc"><p>${ui.footer}</p></div>`;
  sec.innerHTML=h;
  document.querySelectorAll('#tabsBar .tab-btn').forEach(b=>{b.addEventListener('click',()=>{activeTab=b.dataset.tab;document.querySelectorAll('#tabsBar .tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderTab(data,isAI)})});
  renderTab(data,isAI);
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function renderTab(data,isAI){
  const ui=UI[currentLang], c=$('tabContent'); let h='';
  if(activeTab==='conditions'){
    const items=isAI?(data.possible_conditions||[]):(data.conditions||[]);
    h+=`<div class="result-card">`; items.forEach((x,i)=>{const u=x.includes('⚠️');h+=`<div class="condition-item ${u?'urgent':''}" style="animation-delay:${i*.08}s"><span class="condition-num ${u?'urgent':''}">${u?'!':i+1}</span><span class="condition-text ${u?'urgent':''}">${x}</span></div>`}); h+=`</div>`;
  }else if(activeTab==='vitamins'){
    const items=isAI?(data.vitamin_deficiencies||[]):(data.vitamins||[]);
    h+=`<div class="vitamins-list">`; items.forEach((v,i)=>{const p=v.priority||'';h+=`<div class="vitamin-card ${p?'priority-'+p:''}" style="animation-delay:${i*.1}s"><div class="vitamin-header"><span class="vitamin-name">💊 ${v.name}</span>${p?`<span class="priority-badge ${p}">${ui['priority'+p.charAt(0).toUpperCase()+p.slice(1)]||p}</span>`:''}</div><p class="vitamin-dose">${ui.dose} <span>${v.dose}</span></p><p class="vitamin-reason">📌 ${v.reason}</p></div>`}); h+=`</div>`;
  }else if(activeTab==='tests'&&isAI){
    const items=data.recommended_tests||[];
    h+=`<div class="result-card">`; items.forEach((t,i)=>{h+=`<div class="test-item" style="animation-delay:${i*.08}s"><span style="color:#00d2b4">🧪</span><span>${t}</span></div>`}); h+=`</div>`;
  }else if(activeTab==='tips'){
    const items=isAI?(data.lifestyle_tips||[]):(data.tips||[]);
    h+=`<div class="result-card">`; items.forEach((t,i)=>{const u=t.includes('⚠️');h+=`<div class="tip-item ${u?'urgent':''}" style="animation-delay:${i*.08}s"><span class="tip-icon">${u?'🚨':'✨'}</span><span class="tip-text" style="${u?'color:#ff8888':''}">${t}</span></div>`}); h+=`</div>`;
  }
  c.innerHTML=h;
}

// INIT
setLang('ar');

</script>
